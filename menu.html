<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Five Nights at Atlantida</title>
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: black;
      font-family: monospace;
      color: white;
    }

    #fondo-glitch,
    #fondo-normal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    #fondo-normal { z-index: 2; } /* importante pq de esto depende que vaya lo del glitchh */
    #fondo-glitch  { z-index: 1; } /* glitch */

    #overlay {
      position: fixed;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 3;
    }

    #menu {
      position: absolute;
      top: 30%; left: 5%;
      z-index: 4;
    }

    #menu h1 {
      font-size: 50px;
      margin-bottom: 20px;
    }

    #menu button {
      display: block;
      background: transparent;
      border: none;
      color: white;
      font-size: 24px;
      margin: 10px 0;
      cursor: pointer;
    }

    #menu button:hover {
      color: red;
    }

    #panel-noches {
      display: none;
      position: absolute;
      top: 25%; left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      text-align: center;
      background: rgba(10, 0, 0, 0.85);
      border: 2px solid #550000;
      padding: 40px;
      box-shadow: 0 0 20px #ff0000;
      min-width: 400px;
    }

    #panel-noches h2 {
      font-size: 35px;
      margin-bottom: 30px;
      color: #ff0000;
      text-shadow: 2px 2px 5px #000;
      letter-spacing: 2px;
    }

    .boton-noche {
      display: block;
      width: 100%;
      background: transparent;
      border: 1px solid #ff0000;
      color: white;
      font-size: 24px;
      margin: 15px 0;
      padding: 10px;
      cursor: pointer;
      font-family: monospace;
      transition: all 0.3s ease;
    }

    .boton-noche:hover:not(:disabled) {
      background: #ff0000;
      color: black;
      font-weight: bold;
    }

    .boton-noche:disabled {
      color: #666;
      border-color: #333;
      cursor: not-allowed;
    }

    .btn-volver {
      margin-top: 30px;
      font-size: 18px;
      border: none;
      background: none;
      color: #aaa;
      cursor: pointer;
      font-family: monospace;
    }
    .btn-volver:hover {
      color: white;
      text-decoration: underline;
    }

  </style>
</head>
<body>

  <img src="assets/imagenes/menu/YSBwR6.gif" id="fondo-glitch" />
  <img src="assets/imagenes/menu/menu con german sin efecto glicth.png" id="fondo-normal" />

  <div id="overlay"></div>

  <div id="menu">
    <h1>Five Nights at Atlantida</h1>
    <button onclick="nuevaPartida()">▶ NUEVA PARTIDA</button>
    <button onclick="continuar()">CONTINUAR</button>
    <button onclick="opciones()">OPCIONES</button>
  </div>

  <div id="panel-noches">
    <h2>SELECCIONAR NOCHE</h2>
    <button class="boton-noche" onclick="iniciarNoche(1)">▶ NOCHE 1</button>
    <button class="btn-volver" onclick="volverMenu()">[ Volver al menú ]</button>
  </div>

  <script>

    var fondoNormal = document.getElementById("fondo-normal");
    var esAlonso = false; // variable para saber en que personaje estamos

    // reloj de 200ms para efectos de glitch cortos y aleatorios (5 veces por segundo)
    setInterval(function () {
      // 30% de probabilidad de que ocurra un glitch
      if (Math.random() < 0.3) {
        fondoNormal.style.display = "none"; // oculta la foto de enfrente para mostrar el gif de fondo
        
        // cronometro de 100ms para volver a mostrar la foto y acabar el parpadeo rapidisimo
        setTimeout(function () {
          fondoNormal.style.display = "block";
        }, 100);
      }
    }, 200);

    // reloj maestro que suena cada 13 segundos exactamente
    setInterval(function() {
      // oculta la imagen frontal instantaneamente para mostrar el gif y empezar la transicion
      fondoNormal.style.display = "none";
      
      // pausa de 150ms para que el jugador vea el gif
      setTimeout(function() {
        // cambiamos el src a escondidas mientras la pantalla esta rota
        if (esAlonso) {
          fondoNormal.src = "assets/imagenes/menu/menu con german sin efecto glicth.png";
          esAlonso = false;
        } else {
          fondoNormal.src = "assets/imagenes/menu/ALONSO MENU.jpg";
          esAlonso = true;
        }
        
        // volvemos a mostrar la imagen frontal ya con el nuevo personaje
        fondoNormal.style.display = "block";
      }, 150); 
      
    }, 13000);


    function nuevaPartida() {
      document.getElementById("menu").style.display = "none";
      document.getElementById("panel-noches").style.display = "block";
    }

    function volverMenu() {
      document.getElementById("panel-noches").style.display = "none";
      document.getElementById("menu").style.display = "block";
    }

    function iniciarNoche(numero) {
      alert("Iniciando Noche " + numero + "...");
    }

    function continuar() {
      alert("continuando la partida");
    }

    function opciones() {
      alert("cargando opciones");
    }

    // musica de fondo
    var musicaFondo = new Audio("assets/musica/musica-inicio.mp4");
    musicaFondo.volume = 0.5;
    
    musicaFondo.play().catch(function(e) {});

    // forzar q se repita manualmente 
    musicaFondo.addEventListener("ended", function() {
      musicaFondo.currentTime = 0;
      musicaFondo.play().catch(function(e){});
    });

  </script>

</body>
</html>
