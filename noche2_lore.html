<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Historia - Noche 2</title>
  <style>
    body {
      margin: 0;
      background: black url('assets/imagenes/escenarios/sala_principal/oficina.png') center/cover no-repeat fixed;
      color: white;
      font-family: monospace;
      text-align: center;
      padding-top: 50px;
      animation: fadeIn 2s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .lore-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      padding-bottom: 50px;
    }

    .lore-image {
      max-width: 100%;
      border: 2px solid white;
    }

    button {
      padding: 15px 30px;
      font-size: 22px;
      background: transparent;
      color: white;
      border: 2px solid white;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s;
    }
    button:hover { background: white; color: black; }
  </style>
</head>
<body>

  <div class="lore-container">
    <h2>NOCHE 2: LA DIFICULTAD AUMENTA...</h2>
    <img src="assets/imagenes/lore/CARTA DE DESAPARECIDO.png" alt="carta del lore" class="lore-image">
    <button onclick="window.location.href='juego_noche2.html'">Continuar</button>
  </div>

  <script>
    // musica de tension en bucle
    var musica = new Audio("assets/musica/tension carta.mp3");
    musica.volume = 0.5;
    musica.play().catch(function() {});
    musica.addEventListener("ended", function() {
      musica.currentTime = 0;
      musica.play().catch(function() {});
    });
  </script>

</body>
</html>
