<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Intro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #start-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: #cc0000;
      font-family: 'Courier New', Courier, monospace;
      font-size: 2.5rem;
      display: flex; justify-content: center; align-items: center;
      z-index: 10; cursor: pointer;
      text-transform: uppercase; letter-spacing: 5px;
      text-shadow: 2px 2px 20px #ff0000;
      transition: opacity 1.5s ease;
      user-select: none;
    }
  </style>
</head>

<body>
  <div id="start-overlay">Haz clic para comenzar</div>

  <video autoplay>
    <source src="assets/videos/intro.mp4" type="video/mp4" />
  </video>

  <script>
    var video = document.querySelector("video");
    // fix para el bloqueo de google chrome
    
    function startVideo() {
      var overlay = document.getElementById("start-overlay");
      if (overlay) {
        overlay.style.opacity = "0";
        setTimeout(() => overlay.remove(), 1500); // tiempo para la opacidad
      }
      
      video.play().catch(e => {});
      document.removeEventListener("keydown", startVideo);
      document.removeEventListener("click", startVideo);
    }

    document.addEventListener("keydown", startVideo);
    document.addEventListener("click", startVideo);

    
    video.addEventListener("ended", function () {
      window.location.href = "menu.html"; 
    });
  </script>

</body>

</html>
