<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Introduccion - Noche 2</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #saltar {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 10px 20px;
      font-size: 18px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border: 1px solid white;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>

<body>

  <video id="video-intro" autoplay>
    <source src="assets/videos/alonso periodico.mp4" type="video/mp4">
  </video>

  <button id="saltar" onclick="irAlJuego()">Saltar</button>

  <script>
    var video = document.getElementById("video-intro");

    function irAlJuego() {
      window.location.href = "noche2.html";
    }

    video.addEventListener("ended", irAlJuego);
  </script>

</body>

</html>
