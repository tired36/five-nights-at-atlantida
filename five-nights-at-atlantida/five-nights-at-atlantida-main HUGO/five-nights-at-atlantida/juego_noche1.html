<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Partida - Noche 1</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      background-image: url('assets/imagenes/escenarios/SALA PRINCIPAL-20260414T090500Z-3-001/SALA PRINCIPAL/sala principal.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden; /* Evita scrolls */
      height: 100vh;
      width: 100vw;
      user-select: none;
    }

    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* Para que clics pasen al fondo si es necesario */
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 20px;
      box-sizing: border-box;
      z-index: 10;
    }

    .btn-style {
      pointer-events: auto; /* Reactivar clic para botones */
      background-color: rgba(255, 255, 255, 0.2);
      border: 2px solid white;
      color: white;
      padding: 15px 30px;
      font-size: 20px;
      font-family: monospace;
      cursor: pointer;
      text-transform: uppercase;
      transition: background-color 0.3s;
    }

    .btn-style:hover {
      background-color: rgba(255, 255, 255, 0.6);
      color: black;
    }

    .btn-camara {
      width: 400px;
      margin: 0 auto;
    }

    .hora-texto {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-family: monospace;
      font-size: 24px;
      z-index: 10;
    }

    .noche-texto {
      position: absolute;
      top: 50px;
      right: 30px;
      color: white;
      font-family: monospace;
      font-size: 18px;
      z-index: 10;
    }

    /* Overlay Cámaras */
    #cameras-overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #111;
      z-index: 20;
    }

    #camera-view {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      cursor: crosshair; /* Indica que se puede interactuar */
    }

    /* Efecto de estática/filtro para cámaras */
    .cam-efectos {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* No bloquear clics hacia el camera-view */
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 2px,
        transparent 2px,
        transparent 4px
      );
    }

    #instruccion-linterna {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        font-family: monospace;
        font-size: 16px;
        background: rgba(0,0,0,0.5);
        padding: 10px;
        border: 1px dotted white;
        pointer-events: none;
    }

    #camera-map {
      position: absolute;
      bottom: 120px;
      right: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn-cam-select {
      background-color: #333;
      border: 1px solid white;
      color: white;
      padding: 10px 20px;
      font-family: monospace;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-cam-select:hover {
      background-color: #555;
    }

    .btn-cam-select.active {
      background-color: #fff;
      color: #000;
      font-weight: bold;
    }

    #btn-cerrar-camara {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
    }

  </style>
</head>
<body>

  <div class="hora-texto">12:00 AM</div>
  <div class="noche-texto">Noche 1</div>

  <div id="ui-container">
    <button class="btn-style btn-camara">Subir Cámaras</button>
  </div>

  <!-- Sistema de Cámaras Overlay -->
  <div id="cameras-overlay">
    <!-- El contenedor que tendrá la imagen de fondo -->
    <div id="camera-view"></div>
    <div class="cam-efectos"></div>
    
    <div id="instruccion-linterna">Mantén clic en la pantalla para usar la linterna</div>

    <div id="camera-map">
      <button class="btn-cam-select active" data-cam="1">CAM 1</button>
      <button class="btn-cam-select" data-cam="2">CAM 2</button>
      <button class="btn-cam-select" data-cam="3">CAM 3</button>
      <button class="btn-cam-select" data-cam="4">CAM 4</button>
      <button class="btn-cam-select" data-cam="5">CAM 5</button>
    </div>

    <button id="btn-cerrar-camara" class="btn-style">Bajar Cámaras</button>
  </div>

  <script>
    // Configuración de las cámaras y sus imágenes
    const cameras = {
      1: {
        oscura: "assets/imagenes/escenarios/sala 1-20260414T090446Z-3-001/sala 1/sala oscura 1.jpeg",
        linterna: "assets/imagenes/escenarios/sala 1-20260414T090446Z-3-001/sala 1/SALA LINTERNA 1.jpeg"
      },
      2: {
        oscura: "assets/imagenes/escenarios/sala 2-20260414T090434Z-3-001/sala 2/sala 2 oscura.png",
        linterna: "assets/imagenes/escenarios/sala 2-20260414T090434Z-3-001/sala 2/sala 2 linterna.png"
      },
      3: {
        oscura: "assets/imagenes/escenarios/sala3/SALA 3 OSCURA.jpeg",
        linterna: "assets/imagenes/escenarios/sala3/SALA 3 OSCURA LINTERNA.jpeg"
      },
      4: {
        oscura: "assets/imagenes/escenarios/SALA 4-20260414T090455Z-3-001/SALA 4/SALA 4 OSCURA.png",
        linterna: "assets/imagenes/escenarios/SALA 4-20260414T090455Z-3-001/SALA 4/sala 4 linterna.png"
      },
      5: {
        oscura: "assets/imagenes/escenarios/sala 5-20260414T090458Z-3-001/sala 5/sala 5 oscura.png",
        linterna: "assets/imagenes/escenarios/sala 5-20260414T090458Z-3-001/sala 5/sala 5 linterna.png"
      }
    };

    let currentCam = 1;
    let linternaEncedida = false;

    // Referencias al DOM
    const btnCamara = document.querySelector('.btn-camara');
    const overlay = document.getElementById('cameras-overlay');
    const camView = document.getElementById('camera-view');
    const btnCerrar = document.getElementById('btn-cerrar-camara');
    const camSelectores = document.querySelectorAll('.btn-cam-select');

    // Función para actualizar la vista de cámara
    function updateCameraView() {
      const currentImgs = cameras[currentCam];
      // Según el estado de la linterna se muestra la imagen clara o la oscura
      camView.style.backgroundImage = `url('${linternaEncedida ? currentImgs.linterna : currentImgs.oscura}')`;
    }

    // Abrir monitor
    btnCamara.addEventListener('click', () => {
      overlay.style.display = 'block';
      updateCameraView();
    });

    // Cerrar monitor
    btnCerrar.addEventListener('click', () => {
      overlay.style.display = 'none';
      linternaEncedida = false; // resetear linterna al bajar monitor
    });

    // Cambiar de cámara usando botones
    camSelectores.forEach(btn => {
      btn.addEventListener('click', (e) => {
        // Quitar estado activo de todos los botones
        camSelectores.forEach(b => b.classList.remove('active'));
        // Añadir estado activo solo al que hicimos click
        e.target.classList.add('active');
        
        // Actualizar la cámara que estamos viendo
        currentCam = e.target.getAttribute('data-cam');
        linternaEncedida = false; // apagamos linterna al cambiar
        updateCameraView();
      });
    });

    // --- Control de linterna (Presionar pantalla para alumbrar) ---
    // Para PC (Ratón)
    camView.addEventListener('mousedown', () => { 
        linternaEncedida = true; 
        updateCameraView(); 
    });
    camView.addEventListener('mouseup', () => { 
        linternaEncedida = false; 
        updateCameraView(); 
    });
    camView.addEventListener('mouseleave', () => { 
        linternaEncedida = false; 
        updateCameraView(); 
    });

    // Para Móvil (Pantalla Táctil)
    camView.addEventListener('touchstart', (e) => { 
        e.preventDefault(); // prevenir comportamientos por defecto del tactil
        linternaEncedida = true; 
        updateCameraView(); 
    });
    camView.addEventListener('touchend', (e) => { 
        e.preventDefault(); 
        linternaEncedida = false; 
        updateCameraView(); 
    });
  </script>

</body>
</html>
