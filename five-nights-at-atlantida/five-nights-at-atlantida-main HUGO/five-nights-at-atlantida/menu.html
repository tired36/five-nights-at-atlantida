<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Five Nights at Atlantida</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: black;
      font-family: monospace;
      color: white;
    }

    #fondo-glitch,
    #fondo-normal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* fondo-glitch va detras del normal. ocultar el normal = mostrar el gif */
    #fondo-normal {
      z-index: 2;
    }

    #fondo-glitch {
      z-index: 1;
    }

    #overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 3;
    }

    #menu {
      position: absolute;
      top: 30%;
      left: 5%;
      z-index: 4;
    }

    #menu h1 {
      font-size: 50px;
      margin-bottom: 20px;
    }

    #menu button {
      display: block;
      background: transparent;
      border: none;
      color: white;
      font-size: 24px;
      margin: 10px 0;
      cursor: pointer;
    }

    #menu button:hover {
      color: red;
    }

    #panel-noches {
      display: none;
      position: absolute;
      top: 30%;
      left: 5%;
      z-index: 5;
      text-align: center;
      background: rgba(10, 0, 0, 0.85);
      border: 2px solid white;
      padding: 40px;
      min-width: 400px;
    }

    #panel-noches h2 {
      font-size: 35px;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .boton-noche {
      display: block;
      width: 100%;
      background: transparent;
      border: 1px solid white;
      color: white;
      font-size: 24px;
      margin: 15px 0;
      padding: 10px;
      cursor: pointer;
      font-family: monospace;
      transition: all 0.3s;
    }

    .boton-noche:hover:not(:disabled) {
      background: #ff0000;
      color: black;
      font-weight: bold;
    }

    .boton-noche:disabled {
      color: #666;
      border-color: #333;
      cursor: not-allowed;
    }

    .btn-volver {
      margin-top: 30px;
      font-size: 18px;
      border: none;
      background: none;
      color: #aaa;
      cursor: pointer;
      font-family: monospace;
    }

    .btn-volver:hover {
      color: white;
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <img src="assets/imagenes/menu/glitch.gif" id="fondo-glitch">
  <img src="assets/imagenes/menu/menu_german.png" id="fondo-normal">

  <div id="overlay"></div>

  <div id="menu">
    <h1>Five Nights at Atlantida</h1>
    <button onclick="nuevaPartida()">&#9658; NUEVA PARTIDA</button>
    <button onclick="continuar()">CONTINUAR</button>
    <button onclick="opciones()">OPCIONES</button>
  </div>

  <div id="panel-noches">
    <h2>SELECCIONAR NOCHE</h2>
    <button class="boton-noche" onclick="iniciarNoche(1)">&#9658; NOCHE 1</button>
    <button class="boton-noche" onclick="mostrarPopupDesarrollo()">&#9658; NOCHE 2</button>
    <button class="boton-noche" onclick="mostrarPopupDesarrollo()">&#9658; NOCHE 3</button>
    <button class="btn-volver" onclick="volverMenu()">[ Volver al menu ]</button>
  </div>

  <div id="popup-desarrollo"
    style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; background: rgba(10,0,0,0.95); border: 2px solid red; padding: 40px; min-width: 300px; box-shadow: 0 0 15px red;">
    <h2 style="font-size: 30px; margin-bottom: 20px; color: red; letter-spacing: 2px;">EN DESARROLLO</h2>
    <p style="margin-bottom: 30px;">esta noche aun no esta disponible.</p>
    <button class="btn-volver" onclick="cerrarPopupDesarrollo()">[ Cerrar ]</button>
  </div>

  <script>
    var fondoNormal = document.getElementById("fondo-normal");
    var esAlonso = false;

    // glitch rapido: parpadeo corto cada 200ms con 30% de probabilidad
    setInterval(function () {
      if (Math.random() < 0.3) {
        fondoNormal.style.display = "none";
        setTimeout(function () { fondoNormal.style.display = "block"; }, 100);
      }
    }, 200);

    // cada 13 segundos cambia el personaje del fondo aprovechando el glitch
    setInterval(function () {
      fondoNormal.style.display = "none";
      setTimeout(function () {
        fondoNormal.src = esAlonso
          ? "assets/imagenes/menu/menu_german.png"
          : "assets/imagenes/menu/menu_alonso.jpg";
        esAlonso = !esAlonso;
        fondoNormal.style.display = "block";
      }, 150);
    }, 13000);

    function nuevaPartida() {
      document.getElementById("menu").style.display = "none";
      document.getElementById("panel-noches").style.display = "block";
    }

    function volverMenu() {
      document.getElementById("panel-noches").style.display = "none";
      document.getElementById("menu").style.display = "block";
    }

    function iniciarNoche(num) {
      if (num === 1) window.location.href = "video_intro.html";
      else alert("Iniciando Noche " + num + "...");
    }

    function mostrarPopupDesarrollo() {
      document.getElementById("popup-desarrollo").style.display = "block";
    }

    function cerrarPopupDesarrollo() {
      document.getElementById("popup-desarrollo").style.display = "none";
    }

    function continuar() { alert("continuando la partida"); }
    function opciones() { alert("cargando opciones"); }

    // musica de fondo en bucle
    var musica = new Audio("assets/musica/musica-inicio.mp4");
    musica.volume = 0.5;
    musica.play().catch(function () { });
    musica.addEventListener("ended", function () {
      musica.currentTime = 0;
      musica.play().catch(function () { });
    });
  </script>

</body>

</html>
